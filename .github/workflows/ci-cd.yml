name: CI/CD Pipeline - Google Online Boutique.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 🛠️ JOB 1: Build & Push Images (Matrix)
  # ==========================================
  build-and-push:
    name: Build & Push Microservices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - adservice
          - cartservice
          - checkoutservice
          - currencyservice
          - emailservice
          - frontend
          - loadgenerator
          - paymentservice
          - productcatalogservice
          - recommendationservice
          - shippingservice

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mohamedsharaf123
          password: dckr_pat_q41j89RJbzFdJfvAy3pnwqRePRc

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

  # ==========================================
  # 🚀 JOB 2: Deploy to AWS EC2 via SSH
  # ==========================================
  deploy-to-ec2:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    # يشتغل فقط عند الـ Push على الفرع الرئيسي main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. التأكد من وجود مجلد المشروع أو عمل clone
            if [ ! -d "~/microservices-demo" ]; then
              git clone https://github.com/${{ github.repository }}.git ~/microservices-demo
            fi
            
            cd ~/microservices-demo
            
            # 2. تحديث الكود من الجيت هب
            git pull origin main
            
            # 3. سحب الصور الجديدة وتشغيلها
            docker compose pull
            docker compose up -d --remove-orphans
