name: CI/CD Pipeline - Google Online Boutique.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 🛠️ JOB 1: Build & Push Images (Matrix)
  # ==========================================
  build-and-push:
    name: Build & Push Microservices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - adservice
          - cartservice
          - checkoutservice
          - currencyservice
          - emailservice
          - frontend
          - loadgenerator
          - paymentservice
          - productcatalogservice
          - recommendationservice
          - shippingservice

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mohamedsharaf123
          password: dckr_pat_q41j89RJbzFdJfvAy3pnwqRePRc

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'cartservice' && './src/cartservice/src' || format('./src/{0}', matrix.service) }}
          file: ${{ matrix.service == 'cartservice' && './src/cartservice/src/Dockerfile' || format('./src/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: |
            mohamedsharaf123/${{ matrix.service }}:latest
            mohamedsharaf123/${{ matrix.service }}:${{ github.sha }}

  # ==========================================
  # 🚀 JOB 2: Deploy to AWS EC2 via SSH
  # ==========================================
  deploy-to-ec2:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    # يشتغل فقط عند الـ Push على الفرع الرئيسي main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

